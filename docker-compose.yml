services:
  mongodb:
    image: mongo:7
    container_name: dinnerparty-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: dinnerparty-server
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    depends_on:
      - mongodb

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: dinnerparty-client
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://server:5000


volumes:
  mongo_data: